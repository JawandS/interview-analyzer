<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Analyzer</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <header>
    <div class="hd-left">
      <div class="status-dot" title="Local inference active"></div>
      <span class="hd-title">Interview Analyzer</span>
      <span class="hd-tag">&nbsp;· local · private</span>
    </div>

    <div class="hd-center">
      <div id="model-loader" hx-get="/models" hx-trigger="load" hx-swap="outerHTML">
        <span class="model-loading">···</span>
      </div>
    </div>

    <div class="hd-right">
      <button id="themeBtn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>    <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12"  x2="3" y2="12"/>    <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78"  x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="messages">
    <div class="message assistant">
      <span class="label">Analyst</span>
      <div class="bubble">Hello. I'm ready to help you analyze your interview corpus. What would you like to explore?</div>
    </div>
  </div>

  <div class="form-shell">
    <div class="form-row">
      <form id="chat-form">
        <textarea
          id="msg-input"
          name="message"
          placeholder="Ask something about your interviews…"
          required
          rows="1"
          oninput="resize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.form.requestSubmit();}"
        ></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
