<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Analyzer</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #222;
      font-weight: 600;
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 720px;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }

    .message .label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .message p { white-space: pre-wrap; }

    #thinking {
      align-self: flex-start;
      padding: 0.75rem 1rem;
      color: #555;
      font-style: italic;
      font-size: 0.9rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #222;
      background: #0f0f0f;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      resize: none;
      rows: 1;
      min-height: 42px;
      max-height: 160px;
      outline: none;
    }

    textarea:focus { border-color: #444; }

    button {
      background: #2a2a6e;
      border: none;
      border-radius: 6px;
      color: #aab4ff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 1.1rem;
      transition: background 0.15s;
    }

    button:hover { background: #3a3a8e; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .htmx-request button { pointer-events: none; opacity: 0.4; }
  </style>
</head>
<body>
  <header>Interview Analyzer</header>

  <div id="messages">
    <div class="message assistant">
      <span class="label">Assistant</span>
      <p>Hello! I'm ready to help you analyze your interview corpus. What would you like to explore?</p>
    </div>
  </div>

  <form
    hx-post="/chat"
    hx-target="#messages"
    hx-swap="beforeend"
    hx-indicator="#thinking"
    hx-on::after-request="this.reset(); document.getElementById('messages').scrollTop = 999999"
  >
    <textarea
      name="message"
      placeholder="Ask something…"
      required
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.form.requestSubmit();}"
    ></textarea>
    <button type="submit">Send</button>
  </form>

  <div id="thinking" style="display:none">Thinking…</div>
</body>
</html>
