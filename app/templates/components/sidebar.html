<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="doc-section">
    <div class="doc-section-hd">
      <span class="doc-section-label">Documents</span>
      <button class="doc-upload-btn" id="docUploadBtn" title="Upload PDF">+</button>
      <input type="file" id="docFileInput" accept=".pdf" style="display:none">
    </div>
    <div class="doc-list" id="docList"></div>
  </div>
  <div class="corpus-section" id="corpusSection" style="display:none">
    <details class="corpus-details" id="corpusDetails" open>
      <summary class="corpus-summary">Corpus Analysis</summary>
      <div class="corpus-body" id="corpusBody">
        <button class="corpus-refresh-btn" id="corpusRefreshBtn">Load themes</button>
      </div>
    </details>
  </div>
</aside>
